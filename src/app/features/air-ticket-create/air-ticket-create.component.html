<div class="container mt-4">
  <div class="card shadow-lg border-0 air-ticket-card">
    <div class="card-header text-center bg-primary text-white">
      <h4 class="mb-0">
        {{ editMode ? "Edit Air Ticket" : "Create Air Ticket" }}
      </h4>
    </div>

    <div class="card-body">
      <div class="toast-notification" *ngIf="showToast" [ngClass]="toastType">
        {{ toastMessage }}
      </div>
      <form
        #f="ngForm"
        (ngSubmit)="submitTicket(f)"
        novalidate
        class="air-ticket-form"
      >
        <!-- AIRLINE INFO -->
        <div class="row row-section">
          <div class="col-md-4 form-group">
            <label>Airline Name</label>
            <input
              class="form-control"
              name="bimanName"
              [(ngModel)]="currentAirTicket.bimanName"
              #bimanName="ngModel"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>Biman Serial No</label>
            <input
              class="form-control"
              name="bimanserialNo"
              [(ngModel)]="currentAirTicket.bimanserialNo"
              #bimanserialNo="ngModel"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>Airline Code</label>
            <input
              class="form-control"
              name="airlineCode"
              [(ngModel)]="currentAirTicket.airlineCode"
              #airlineCode="ngModel"
              required
            />
          </div>
        </div>

        <!-- ROUTE -->
        <div class="row row-section">
          <div class="col-md-4 form-group">
            <label>From</label>
            <input
              class="form-control"
              name="from"
              [(ngModel)]="currentAirTicket.from"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>To</label>
            <input
              class="form-control"
              name="to"
              [(ngModel)]="currentAirTicket.to"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>Baggage Allowance</label>
            <input
              class="form-control"
              name="baggageAllowance"
              [(ngModel)]="currentAirTicket.baggageAllowance"
              required
            />
          </div>
        </div>

        <!-- AIRPORT -->
        <div class="row row-section">
          <div class="col-md-4 form-group">
            <label>Boarding Airport</label>
            <input
              class="form-control"
              name="boardingAirport"
              [(ngModel)]="currentAirTicket.boardingAirport"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>Dropping Airport</label>
            <input
              class="form-control"
              name="droppingAirport"
              [(ngModel)]="currentAirTicket.droppingAirport"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>Travel Date</label>
            <input
              type="date"
              class="form-control"
              name="travelDate"
              [(ngModel)]="currentAirTicket.travelDate"
              required
            />
          </div>
        </div>

        <!-- TIME -->
        <div class="row row-section">
          <div class="col-md-4 form-group">
            <label>Departure Time</label>
            <input
              type="time"
              class="form-control"
              name="departureTime"
              [(ngModel)]="currentAirTicket.departureTime"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>Arrival Date</label>
            <input
              type="date"
              class="form-control"
              name="arrivalDate"
              [(ngModel)]="currentAirTicket.arrivalDate"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>Arrival Time</label>
            <input
              type="time"
              class="form-control"
              name="arrivalTime"
              [(ngModel)]="currentAirTicket.arrivalTime"
              required
            />
          </div>
        </div>

        <!-- PRICES -->
        <div class="row row-section">
          <div class="col-md-4 form-group">
            <label>Adult Price</label>
            <input
              type="number"
              class="form-control"
              name="priceForAdult"
              [(ngModel)]="currentAirTicket.priceForAdult"
              min="0"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>Child Price</label>
            <input
              type="number"
              class="form-control"
              name="priceForChild"
              [(ngModel)]="currentAirTicket.priceForChild"
              min="0"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>Infant Price</label>
            <input
              type="number"
              class="form-control"
              name="priceForInfant"
              [(ngModel)]="currentAirTicket.priceForInfant"
              min="0"
              required
            />
          </div>
        </div>

        <!-- EXTRA -->
        <div class="row row-section">
          <div class="col-md-4 form-group">
            <label>Tax</label>
            <input
              type="number"
              class="form-control"
              name="Tax"
              [(ngModel)]="currentAirTicket.Tax"
              min="0"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>Other Charges</label>
            <input
              type="number"
              class="form-control"
              name="OtherCharges"
              [(ngModel)]="currentAirTicket.OtherCharges"
              min="0"
              required
            />
          </div>

          <div class="col-md-4 form-group">
            <label>Processing Fee</label>
            <input
              type="number"
              class="form-control"
              name="processingFee"
              [(ngModel)]="currentAirTicket.processingFee"
              min="0"
              required
            />
          </div>
        </div>

        <!-- COUPON + INSURANCE + IMAGE -->
        <div class="row row-section align-items-end">
          <div class="col-md-4 form-group">
            <label>Coupon Code</label>
            <input
              type="text"
              class="form-control"
              name="cuponCode"
              [(ngModel)]="currentAirTicket.cuponCode"
              required
            />
          </div>

          <div class="col-md-4 form-group d-flex align-items-center">
            <div class="form-check">
              <input
                type="checkbox"
                class="form-check-input"
                name="insurance"
                [(ngModel)]="currentAirTicket.insurance"
              />
              <label class="form-check-label">Insurance</label>
            </div>
          </div>

          <div class="col-md-4 form-group">
            <label>Air Image</label>
            <input
              type="file"
              class="form-control"
              (change)="onImageSelected($event)"
            />

            <img
              *ngIf="currentAirTicket.airImageUrl"
              [src]="currentAirTicket.airImageUrl"
              width="110"
              class="mt-2 rounded shadow-sm"
            />
          </div>
        </div>

        <!-- SEAT BUTTON -->
        <div class="text-center mt-3">
          <button
            type="button"
            class="btn btn-primary"
            (click)="seatPlanOpen = true"
          >
            Seat Allocation
          </button>
        </div>
        <!-- SEAT PANEL -->
        <div class="plane-wrapper" *ngIf="seatPlanOpen">
          <!-- CLASS SELECT -->
          <div class="btn-group w-100 mb-2">
            <button
              type="button"
              class="btn"
              [class.btn-primary]="selectedClass === 'Economy'"
              [class.btn-outline-primary]="selectedClass !== 'Economy'"
              (click)="selectedClass = 'Economy'"
            >
              Economy
            </button>
            <button
              type="button"
              class="btn"
              [class.btn-warning]="selectedClass === 'Business'"
              [class.btn-outline-warning]="selectedClass !== 'Business'"
              (click)="selectedClass = 'Business'"
            >
              Business
            </button>
            <button
              type="button"
              class="btn"
              [class.btn-dark]="selectedClass === 'First'"
              [class.btn-outline-dark]="selectedClass !== 'First'"
              (click)="selectedClass = 'First'"
            >
              First Class
            </button>
          </div>
          <!-- LEGEND -->
          <div class="text-center mb-2">
            <small>
              <span class="badge badge-success mr-1">Available</span>
              <span class="badge badge-secondary">Unavailable</span>
            </small>
          </div>
          <!-- SEAT ACTIONS -->
          <div class="d-flex justify-content-center align-items-center mb-2">
            <button
              type="button"
              class="btn btn-success btn-sm mr-2"
              (click)="markAllAvailable()"
            >
              All Available
            </button>
            <button
              type="button"
              class="btn btn-secondary btn-sm mr-2"
              (click)="markAllUnavailable()"
            >
              All Unavailable
            </button>
            <button
              type="button"
              class="btn btn-danger btn-sm"
              (click)="seatPlanOpen = false"
            >
              X
            </button>
          </div>
          <!-- PLANE SEAT MAP -->
          <div class="plane-body">
            <div class="seat-row" *ngFor="let row of getRows()">
              <!-- LEFT -->
              <div class="seat-group left">
                <button
                  *ngFor="let seat of getSeats(row, 'left')"
                  type="button"
                  class="seat-btn"
                  [ngClass]="{
                    available: isAvailable(seat),
                    unavailable: !isAvailable(seat),
                  }"
                  (click)="toggleSeat(seat); $event.stopPropagation()"
                >
                  {{ seat }}
                </button>
              </div>
              <!-- AISLE -->
              <div class="aisle"></div>
              <!-- RIGHT -->
              <div class="seat-group right">
                <button
                  *ngFor="let seat of getSeats(row, 'right')"
                  type="button"
                  class="seat-btn"
                  [ngClass]="{
                    available: isAvailable(seat),
                    unavailable: !isAvailable(seat),
                  }"
                  (click)="toggleSeat(seat); $event.stopPropagation()"
                >
                  {{ seat }}
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- SUBMIT -->
        <div class="text-center mt-4">
          <button type="submit" class="btn btn-success px-5">
            {{ editMode ? "Update" : "Create" }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
