<header class="shohoz-header" (click)="closeDropdown(); closeMobileMenu()">
  <!-- LEFT -->
  <div class="header-left">
    <!-- MOBILE MENU BUTTON -->
    <button class="mobile-toggle d-lg-none" (click)="toggleMobileMenu($event)">
      ☰
    </button>

    <!-- LOGO -->
    <img
      src="./assets/images/shohoz_logo_new.png"
      alt="Shohoz Logo"
      class="logo"
    />

    <!-- DESKTOP NAV -->
    <nav class="nav-menu d-none d-lg-flex">
      <button
        *ngFor="let item of navItems"
        class="nav-btn"
        [class.active]="activeNav === item.key"
        (click)="setActive(item.key); $event.stopPropagation()"
      >
        <ng-container
          *ngIf="
            item.icon.startsWith('/') || item.icon.startsWith('http');
            else textIcon
          "
        >
          <img [src]="item.icon" alt="{{ item.label }} icon" class="nav-icon" />
        </ng-container>

        <ng-template #textIcon>
          <span class="icon">{{ item.icon }}</span>
        </ng-template>

        {{ item.label }}

        <span *ngIf="item.beta" class="beta-badge"> BETA </span>
      </button>
    </nav>
  </div>

  <!-- RIGHT -->
  <div class="header-right">
    <!-- PHONE -->
    <button
      class="phone-btn d-none d-md-flex"
      (click)="$event.stopPropagation()"
    >
      <span class="icon">📞</span>
      16374
    </button>

    <!-- PROFILE -->
    <div class="profile-wrapper" (click)="$event.stopPropagation()">
      <button class="profile-btn" (click)="toggleDropdown($event)">
        <div class="avatar-circle">
          <span class="icon">👤</span>
        </div>

        <span class="status d-none d-md-block">
          {{ user?.firstName }}
        </span>

        <span class="icon chevron" [class.rotate]="isDropdownOpen"> ▼ </span>
      </button>

      <!-- DROPDOWN -->
      <div class="profile-dropdown" [class.open]="isDropdownOpen">
        <div class="dropdown-user-info">
          <div class="dropdown-username">
            {{ user?.firstName }}
          </div>

          <div class="dropdown-email">
            {{ user?.email }}
          </div>
        </div>

        <button class="dropdown-item-btn" (click)="onMyProfile()">
          <span class="icon">👤</span>
          My Profile
        </button>

        <button class="dropdown-item-btn" (click)="onChangePassword()">
          <span class="icon">🔒</span>
          Change Password
        </button>

        <ng-container *ngIf="user?.role === 'admin'">
          <button class="dropdown-item-btn" (click)="onCreateBusTicket()">
            <span class="icon">🚌</span>
            Create Bus Ticket
          </button>

          <button class="dropdown-item-btn" (click)="onCreateAirTicket()">
            <span class="icon">✈️</span>
            Create Air Ticket
          </button>
        </ng-container>

        <hr />

        <button class="dropdown-item-btn logout" (click)="onLogout()">
          <span class="icon">🚪</span>
          Logout
        </button>
      </div>
    </div>
  </div>

  <!-- MOBILE MENU -->
  <div
    class="mobile-menu"
    [class.open]="isMobileMenuOpen"
    (click)="$event.stopPropagation()"
  >
    <button
      *ngFor="let item of navItems"
      class="mobile-nav-btn"
      [class.active]="activeNav === item.key"
      (click)="setActive(item.key)"
    >
      <span class="icon">{{ item.icon }}</span>

      {{ item.label }}

      <span *ngIf="item.beta" class="beta-badge"> BETA </span>
    </button>
  </div>
</header>
